<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Έργα μας - AM & AR Construction LTD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a1625;
            --accent: #d4af37;
            --light: #f5f7fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            color: #333;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10,22,37,.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-shadow: 0 3px 15px rgba(0,0,0,.25);
        }

        .logo-small {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
        }

        .logo-small:hover { transform: scale(1.05); }

        .flags { display: flex; gap: 12px; }

        .flags img {
            width: 42px;
            border-radius: 6px;
            cursor: pointer;
            transition: .3s;
        }

        .flags img:hover { transform: translateY(-3px) scale(1.05); }

        .header {
            text-align: center;
            padding: 60px 20px 10px;
        }

        .header h1 {
            font-size: 2.6rem;
            color: var(--primary);
        }

        .header p {
            margin-top: 10px;
            color: #666;
        }

        .header-line {
            width: 80px;
            height: 4px;
            background: var(--accent);
            border-radius: 10px;
            margin: 18px auto 0;
        }

        /* Counter badge */
        .project-count {
            display: inline-block;
            margin-top: 16px;
            background: var(--primary);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 5px 16px;
            border-radius: 20px;
        }

        /* ── Masonry-style grid ── */
        .gallery {
            max-width: 1200px;
            margin: 40px auto 80px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 220px;
            gap: 18px;
            flex: 1;
        }

        /* Featured tiles: span 2 cols & 2 rows */
        .gallery-item:nth-child(1),
        .gallery-item:nth-child(6),
        .gallery-item:nth-child(9) {
            grid-column: span 2;
            grid-row: span 2;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,.09);
            cursor: pointer;
            transition: transform .3s, box-shadow .3s;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .45s ease;
            display: block;
        }

        .gallery-item:hover img { transform: scale(1.07); }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0,0,0,.16);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 14px 14px;
            background: linear-gradient(to top, rgba(10,22,37,.75), transparent);
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .overlay span.num {
            background: var(--accent);
            color: var(--primary);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: auto;
        }

        @media(max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: 200px;
            }
            .gallery-item:nth-child(1),
            .gallery-item:nth-child(6),
            .gallery-item:nth-child(9) {
                grid-column: span 2;
                grid-row: span 2;
            }
        }

        @media(max-width: 560px) {
            .gallery {
                grid-template-columns: 1fr;
                grid-auto-rows: 220px;
            }
            .gallery-item:nth-child(1),
            .gallery-item:nth-child(6),
            .gallery-item:nth-child(9) {
                grid-column: span 1;
                grid-row: span 1;
            }
            .header h1 { font-size: 2rem; }
            .topbar { padding: 15px 20px; }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <img src="logo.jpg" class="logo-small" alt="Logo" onclick="goHome()">
        <div class="flags">
            <img src="https://flagcdn.com/48x36/gr.png" onclick="switchLang('el')" alt="Ελληνικά">
            <img src="https://flagcdn.com/48x36/gb.png" onclick="switchLang('en')" alt="English">
        </div>
    </div>

    <div class="header">
        <h1>Ολοκληρωμένα Έργα</h1>
        <p>Μια συλλογή από τα πιο πρόσφατα κατασκευαστικά μας έργα</p>
        <div class="header-line"></div>
        <span class="project-count">12 ΕΡΓΑ</span>
    </div>

    <div class="gallery">
        <div class="gallery-item" onclick="openImage('Project(1).jpeg')">
            <img src="Project(1).jpeg" alt="Έργο 1">
            <div class="overlay"><span class="num">01</span> Έργο 1</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(2).jpeg')">
            <img src="Project(2).jpeg" alt="Έργο 2">
            <div class="overlay"><span class="num">02</span> Έργο 2</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(3).jpeg')">
            <img src="Project(3).jpeg" alt="Έργο 3">
            <div class="overlay"><span class="num">03</span> Έργο 3</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(4).jpeg')">
            <img src="Project(4).jpeg" alt="Έργο 4">
            <div class="overlay"><span class="num">04</span> Έργο 4</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(5).jpeg')">
            <img src="Project(5).jpeg" alt="Έργο 5">
            <div class="overlay"><span class="num">05</span> Έργο 5</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(6).jpeg')">
            <img src="Project(6).jpeg" alt="Έργο 6">
            <div class="overlay"><span class="num">06</span> Έργο 6</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(7).jpeg')">
            <img src="Project(7).jpeg" alt="Έργο 7">
            <div class="overlay"><span class="num">07</span> Έργο 7</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(8).jpeg')">
            <img src="Project(8).jpeg" alt="Έργο 8">
            <div class="overlay"><span class="num">08</span> Έργο 8</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(9).jpeg')">
            <img src="Project(9).jpeg" alt="Έργο 9">
            <div class="overlay"><span class="num">09</span> Έργο 9</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(10).jpeg')">
            <img src="Project(10).jpeg" alt="Έργο 10">
            <div class="overlay"><span class="num">10</span> Έργο 10</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(11).jpeg')">
            <img src="Project(11).jpeg" alt="Έργο 11">
            <div class="overlay"><span class="num">11</span> Έργο 11</div>
        </div>
        <div class="gallery-item" onclick="openImage('Project(12).jpeg')">
            <img src="Project(12).jpeg" alt="Έργο 12">
            <div class="overlay"><span class="num">12</span> Έργο 12</div>
        </div>
    </div>

    <footer>
        <p><strong>AM & AR Construction LTD</strong></p>
        <p>© 2026 All Rights Reserved</p>
    </footer>

    <script>
        function openImage(img) {
            window.location.href = "image-view.html?img=" + encodeURIComponent(img);
        }

        function goHome() {
            window.location.href = "index.html";
        }

        function switchLang(lang) {
            if (lang === 'en') {
                window.location.href = 'projects-en.html';
            } else {
                window.location.href = 'projects.html';
            }
        }
    </script>

</body>
</html>
